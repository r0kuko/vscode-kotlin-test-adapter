name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, compile & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error

      - name: Type-check
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package VSIX (smoke test)
        run: npx --yes @vscode/vsce@latest package --out "vscode-kotlin-test-adapter-${{ github.sha }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 7
