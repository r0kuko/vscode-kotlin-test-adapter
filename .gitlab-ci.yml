# GitLab CI for vscode-kotlin-test-adapter
#
# Pipeline overview
#  - install : restore npm deps (cached)
#  - verify  : type-check + compile (runs on every MR and main push)
#  - package : produce a .vsix artifact (runs on every MR, main push and tag)
#  - publish : publish to VS Code Marketplace (runs only on tags vX.Y.Z)
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   VSCE_PAT  – Azure DevOps PAT with Marketplace > Manage scope (Masked, Protected)
#   OVSX_PAT  – Open VSX token (optional; only needed if you enable the publish:openvsx job)

default:
  image: node:20-alpine
  tags:
    - docker

stages:
  - install
  - verify
  - package
  - publish

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  # Speed up `npm ci` and avoid optional download noise from `sharp` etc.
  npm_config_fund: "false"
  npm_config_audit: "false"

# Cache npm + node_modules between jobs in the same pipeline.
.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/

install:
  stage: install
  <<: *node_cache
  script:
    - npm ci --no-audit --no-fund --loglevel=error
  artifacts:
    expire_in: 1 day
    paths:
      - node_modules/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

verify:
  stage: verify
  <<: *node_cache
  needs: [install]
  script:
    - npm run lint
    - npm run compile
  artifacts:
    expire_in: 1 day
    paths:
      - out/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

package:
  stage: package
  <<: *node_cache
  needs: [verify]
  script:
    - npx --yes @vscode/vsce@latest package --out "vscode-kotlin-test-adapter-${CI_COMMIT_SHORT_SHA}.vsix"
  artifacts:
    expire_in: 1 week
    paths:
      - "*.vsix"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

publish:marketplace:
  stage: publish
  <<: *node_cache
  needs: [verify]
  script:
    - |
      if [ -z "$VSCE_PAT" ]; then
        echo "VSCE_PAT is not set – aborting." >&2
        exit 1
      fi
    # `vsce publish` reads version from package.json. The git tag must match.
    - npx --yes @vscode/vsce@latest publish --pat "$VSCE_PAT"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# Optional: also publish to https://open-vsx.org for VSCodium / Cursor users.
# Enable by setting OVSX_PAT in CI/CD variables; the job will skip otherwise.
publish:openvsx:
  stage: publish
  <<: *node_cache
  needs: [package]
  script:
    - |
      if [ -z "$OVSX_PAT" ]; then
        echo "OVSX_PAT not set – skipping Open VSX publish."
        exit 0
      fi
    - npx --yes ovsx@latest publish *.vsix --pat "$OVSX_PAT"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
  allow_failure: true
